name:  CI tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          
      - name: Format check
        run: |
          ruff check .
          ruff format --check .

      - name: Line check
        run: |
          ruff check src
          ruff check tests

      - name: Test with pytest
        run: |
          pytest tests