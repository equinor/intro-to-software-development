on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint check
        run: |
          ruff check .

      - name: Format check
        run: |
          ruff format --check .

      - name: Type checking
        run: |
          mypy

      - name: Test with pytest
        run: |
          pytest
